<svg xmlns="http://www.w3.org/2000/svg">
<defs>

<!-- ===================== -->
<!-- ===== 3×3 MOVES ===== -->
<!-- ===================== -->

<symbol id="R-3" viewBox="0 0 100 100">
  <text x="50" y="20" font-size="36" font-weight="700" text-anchor="middle" fill="currentColor">R</text>
  <rect x="19" y="34" width="62" height="62" rx="5" fill="white" stroke="currentColor" stroke-width="2"/>

  <!-- grid -->
  <line x1="39.3" y1="35.1" x2="39.3" y2="95" stroke="lightgray"/>
  <line x1="60.6" y1="35.1" x2="60.6" y2="95" stroke="lightgray"/>
  <line x1="20" y1="55.1" x2="79.9" y2="55.1" stroke="lightgray"/>
  <line x1="20" y1="75" x2="79.9" y2="75" stroke="lightgray"/>

  <!-- slice -->
  <line x1="70" y1="44.5" x2="70" y2="85.5" stroke="currentColor" stroke-width="3"/>

  <!-- arrow -->
  <polygon points="70,40 64,50 76,50" fill="currentColor"/>
</symbol>

